name: 3d-model-web-viewer

services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile.server
    env_file:
      - ../.env
    environment:
      PORT: 3009
      DATA_DIR: /app/data
      WORKER_OUTPUT_DIR: /app/data/worker-output
      MAX_MODEL_ARTIFACT_BYTES: ${MAX_MODEL_ARTIFACT_BYTES:-262144000}
    ports:
      - "3009:3009"
    volumes:
      - ../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3009/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    env_file:
      - ../.env
    environment:
      SERVER_URL: http://server:3009
      WORKER_OUTPUT_DIR: /app/worker-output
      CONVERTER_CLI: /app/apps/converter/src/cli.js
      XCAF_CONVERTER_BIN: /app/bin/xcaf-step-to-glb
      MATERIAL_RULES_PATH: /app/config/material-rules.json
      MAX_MODEL_ARTIFACT_BYTES: ${MAX_MODEL_ARTIFACT_BYTES:-262144000}
    volumes:
      - ../data/worker-output:/app/worker-output
      - ../config/material-rules.json:/app/config/material-rules.json:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
