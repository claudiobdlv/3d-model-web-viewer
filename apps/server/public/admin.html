<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D CAD Asset Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@300..600,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/admin.js" defer></script>
  </head>
  <body class="admin-body">
    <header class="app-topbar">
      <div class="brand-lockup">
        <span class="brand-mark material-symbols-outlined" aria-hidden="true">deployed_code</span>
        <div>
          <strong>3D CAD Asset Manager</strong>
          <span>Technical review workspace</span>
        </div>
      </div>

      <div class="topbar-actions">
        <label class="search-field">
          <span class="material-symbols-outlined" aria-hidden="true">search</span>
          <input id="modelSearch" type="search" placeholder="Search models" autocomplete="off" />
        </label>
        <button id="topUploadButton" class="primary-button" type="button">
          <span class="material-symbols-outlined" aria-hidden="true">upload_file</span>
          Upload
        </button>
        <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme" title="Toggle theme">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
      </div>
    </header>

    <main class="admin-shell">
      <aside class="sidebar">
        <section class="sidebar-section">
          <div class="sidebar-heading">
            <div>
              <span class="eyebrow">File Manager</span>
              <h1>Projects</h1>
            </div>
            <button id="createFolderButton" class="icon-button" type="button" aria-label="Create folder" title="Create folder">
              <span class="material-symbols-outlined" aria-hidden="true">create_new_folder</span>
            </button>
          </div>
          <nav id="folderList" class="folder-list" aria-label="Project folders">Loading...</nav>
        </section>

        <section class="sidebar-section sidebar-meter">
          <div class="meter-row">
            <span>Ready assets</span>
            <strong id="readyMeterLabel">0%</strong>
          </div>
          <div class="meter-track"><span id="readyMeterBar"></span></div>
          <p id="sidebarSummary">Waiting for model inventory.</p>
        </section>
      </aside>

      <section class="admin-content">
        <section id="dropZone" class="upload-zone" tabindex="0">
          <input id="modelFileInput" class="visually-hidden" type="file" name="modelFile" accept=".step,.stp,.glb,.gltf" />
          <form id="uploadForm" action="/api/models" method="post" enctype="multipart/form-data">
            <input id="uploadFolderId" type="hidden" name="folderId" />
          </form>
          <div class="upload-icon material-symbols-outlined" aria-hidden="true">upload_file</div>
          <div>
            <h2>Drag and drop 3D files</h2>
            <p id="selectedFolderLabel">Uploading to Unsorted.</p>
          </div>
          <button id="browseButton" class="primary-button" type="button">
            <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
            Browse files
          </button>
        </section>

        <section class="asset-panel">
          <div class="panel-toolbar">
            <div>
              <span class="eyebrow">Asset Library</span>
              <h2 id="modelListTitle">All models</h2>
              <p id="refreshStatus">Live refresh is starting.</p>
            </div>
            <div class="toolbar-actions">
              <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh models" title="Refresh models">
                <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
              </button>
            </div>
          </div>
          <div id="modelList" class="model-list">Loading...</div>
        </section>
      </section>
    </main>
  </body>
</html>
