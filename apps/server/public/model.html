<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@300..600,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="viewer-body">
    <header class="viewer-topbar">
      <div class="viewer-title-group">
        <a class="back-button" href="/admin">
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
          Dashboard
        </a>
        <div class="topbar-divider"></div>
        <div>
          <h1 id="modelTitle">Model Viewer</h1>
          <p id="modelMeta"></p>
        </div>
      </div>
      <div class="viewer-actions">
        <p id="downloadLinks"></p>
        <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme" title="Toggle theme">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
      </div>
    </header>

    <main class="viewer-stage">
      <section id="notReady" class="not-ready hidden">
        <span class="material-symbols-outlined" aria-hidden="true">hourglass_empty</span>
        <h2>Model not processed yet</h2>
        <p>The original file is uploaded, but there is no display.glb for this model yet.</p>
      </section>

      <section id="viewerShell" class="viewer-shell hidden">
        <div id="viewerCanvas" class="viewer"></div>

        <div class="axis-gizmo" aria-hidden="true">
          <svg viewBox="0 0 100 100" role="img">
            <line class="axis-x" x1="50" x2="85" y1="50" y2="50"></line>
            <text class="axis-x" x="88" y="53">X</text>
            <line class="axis-y" x1="50" x2="50" y1="50" y2="15"></line>
            <text class="axis-y" x="47" y="12">Y</text>
            <line class="axis-z" x1="50" x2="30" y1="50" y2="70"></line>
            <text class="axis-z" x="20" y="78">Z</text>
            <circle cx="50" cy="50" r="3"></circle>
          </svg>
        </div>

        <div class="viewport-controls" aria-label="Viewport controls">
          <span title="Orbit"><span class="material-symbols-outlined" aria-hidden="true">orbit</span></span>
          <span title="Pan"><span class="material-symbols-outlined" aria-hidden="true">pan_tool</span></span>
          <span title="Zoom"><span class="material-symbols-outlined" aria-hidden="true">zoom_in</span></span>
          <button id="fitViewButton" type="button" title="Fit model" aria-label="Fit model">
            <span class="material-symbols-outlined" aria-hidden="true">center_focus_weak</span>
          </button>
        </div>

        <aside id="objectInfo" class="object-info hidden" aria-live="polite">
          <div class="object-info-header">
            <div>
              <span class="eyebrow">Object Info</span>
              <h2 id="objectInfoTitle">Object info</h2>
              <p id="objectInfoSubtitle"></p>
            </div>
            <button id="closeInfo" class="icon-button" type="button" aria-label="Close object info">
              <span class="material-symbols-outlined" aria-hidden="true">close</span>
            </button>
          </div>
          <div id="objectInfoBody"></div>
        </aside>
      </section>
    </main>

    <script type="module" src="/model.js"></script>
  </body>
</html>
