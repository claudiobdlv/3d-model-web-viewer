<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  </head>
  <body>
    <main class="page viewer-page">
      <div class="viewer-toolbar">
        <a href="/">Back to uploads</a>
        <div>
          <h1 id="modelTitle">Model Viewer</h1>
          <p id="modelMeta"></p>
        </div>
      </div>

      <section id="notReady" class="panel hidden">
        <h2>Model not processed yet</h2>
        <p>The original file is uploaded, but there is no display.glb for this model yet.</p>
      </section>

      <model-viewer
        id="viewer"
        class="viewer hidden"
        camera-controls
        auto-rotate
        ar
        shadow-intensity="1"
        exposure="1"
      ></model-viewer>
    </main>

    <script>
      const slug = window.location.pathname.split("/").filter(Boolean).pop();
      const title = document.querySelector("#modelTitle");
      const meta = document.querySelector("#modelMeta");
      const viewer = document.querySelector("#viewer");
      const notReady = document.querySelector("#notReady");

      async function loadModel() {
        const modelResponse = await fetch(`/api/models/${encodeURIComponent(slug)}`);
        if (!modelResponse.ok) {
          title.textContent = "Model not found";
          notReady.classList.remove("hidden");
          return;
        }

        const model = await modelResponse.json();
        title.textContent = model.name;
        meta.textContent = `${model.source_filename} | ${model.status}`;

        const displayResponse = await fetch(`/model-files/${encodeURIComponent(slug)}/display.glb`, {
          method: "HEAD"
        });

        if (!displayResponse.ok) {
          notReady.classList.remove("hidden");
          return;
        }

        viewer.setAttribute("src", `/model-files/${encodeURIComponent(slug)}/display.glb`);
        viewer.setAttribute("alt", model.name);
        viewer.classList.remove("hidden");
      }

      loadModel();
    </script>
  </body>
</html>
